<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ObesiCare | Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0052CC" />
  <style>
    .link-btn {
      background: none;
      border: none;
      color: var(--medical-blue-500);
      cursor: pointer;
      font-weight: 700;
      text-decoration: underline;
      padding: 0;
      font-size: inherit;
      transition: color 200ms ease;
    }
    .link-btn:hover {
      color: var(--medical-blue-700);
    }
  </style>
</head>
<body data-page="login">
  <main class="phone-shell">
    <section class="card">
      <div class="app-head">
        <div class="app-logo">+</div>
        <div>
          <p class="app-name">ObesiCare</p>
          <p class="app-tag">AI Lifestyle Risk Screening</p>
        </div>
      </div>

      <p class="eyebrow">Secure Authentication</p>
      <h1 id="authTitle">Login to Your Account</h1>
      <p class="subtitle">Access your personalized obesity risk assessment and health history.</p>

      <div class="info-strip">
        <span>Secure Login</span>
        <span>Password Protected</span>
        <span>Personal Health Records</span>
      </div>

      <!-- Login Form -->
      <form id="loginForm" class="form-grid" style="display: block;">
        <label>
          Username
          <input type="text" name="name" required placeholder="Choose a username" />
        </label>

        <label>
          Password
          <input type="password" name="password" required placeholder="Enter your password" />
        </label>

        <button type="submit">Login to Account</button>

        <p class="auth-toggle" style="text-align: center; margin-top: 12px; font-size: 0.9rem;">
          Don't have an account?
          <button type="button" id="toggleSignup" class="link-btn">Sign Up</button>
        </p>
      </form>

      <!-- Signup Form -->
      <form id="signupForm" class="form-grid" style="display: none;">
        <label>
          Create Username
          <input type="text" name="name" required placeholder="Choose a unique username" />
        </label>

        <label>
          Create Password
          <input type="password" name="password" required placeholder="At least 6 characters" />
        </label>

        <label>
          Confirm Password
          <input type="password" name="confirmPassword" required placeholder="Re-enter password" />
        </label>

        <button type="submit">Create Account</button>

        <p class="auth-toggle" style="text-align: center; margin-top: 12px; font-size: 0.9rem;">
          Already have an account?
          <button type="button" id="toggleLogin" class="link-btn">Login</button>
        </p>
      </form>

      <div id="authMessage" style="display: none; margin-top: 12px; padding: 10px; border-radius: 8px; font-size: 0.9rem; text-align: center;"></div>
    </section>
  </main>

  <script src="script.js"></script>
  <script>
    const API_URL = 'https://obesity-risk-prediction-system.onrender.com';
    const loginForm = document.getElementById('loginForm');
    const signupForm = document.getElementById('signupForm');
    const toggleSignupBtn = document.getElementById('toggleSignup');
    const toggleLoginBtn = document.getElementById('toggleLogin');
    const authTitle = document.getElementById('authTitle');
    const authMessage = document.getElementById('authMessage');

    // Toggle between login and signup forms
    toggleSignupBtn.addEventListener('click', (e) => {
      e.preventDefault();
      loginForm.style.display = 'none';
      signupForm.style.display = 'block';
      authTitle.textContent = 'Create Your Account';
      authMessage.style.display = 'none';
    });

    toggleLoginBtn.addEventListener('click', (e) => {
      e.preventDefault();
      signupForm.style.display = 'none';
      loginForm.style.display = 'block';
      authTitle.textContent = 'Login to Your Account';
      authMessage.style.display = 'none';
    });

    // Handle Login
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.querySelector('#loginForm input[name="name"]').value;
      const password = document.querySelector('#loginForm input[name="password"]').value;

      try {
        const response = await fetch(`${API_URL}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, password })
        });

        const data = await response.json();

        if (response.ok) {
          authMessage.style.display = 'block';
          authMessage.style.background = 'rgba(46, 125, 50, 0.2)';
          authMessage.style.color = '#2e7d32';
          authMessage.style.borderLeft = '4px solid #2e7d32';
          authMessage.textContent = '✓ ' + data.message;
          
          // Store user session
          localStorage.setItem('user_id', data.user_id);
          localStorage.setItem('user_name', data.name);
          
          setTimeout(() => {
            window.location.href = 'form.html';
          }, 1000);
        } else {
          authMessage.style.display = 'block';
          authMessage.style.background = 'rgba(211, 47, 47, 0.2)';
          authMessage.style.color = '#d32f2f';
          authMessage.style.borderLeft = '4px solid #d32f2f';
          authMessage.textContent = '✗ ' + data.error;
        }
      } catch (error) {
        authMessage.style.display = 'block';
        authMessage.style.background = 'rgba(211, 47, 47, 0.2)';
        authMessage.style.color = '#d32f2f';
        authMessage.style.borderLeft = '4px solid #d32f2f';
        authMessage.textContent = '✗ Connection error. Please try again.';
      }
    });

    // Handle Signup
    signupForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.querySelector('#signupForm input[name="name"]').value;
      const password = document.querySelector('#signupForm input[name="password"]').value;
      const confirmPassword = document.querySelector('#signupForm input[name="confirmPassword"]').value;

      if (password !== confirmPassword) {
        authMessage.style.display = 'block';
        authMessage.style.background = 'rgba(211, 47, 47, 0.2)';
        authMessage.style.color = '#d32f2f';
        authMessage.style.borderLeft = '4px solid #d32f2f';
        authMessage.textContent = '✗ Passwords do not match.';
        return;
      }

      try {
        const response = await fetch(`${API_URL}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, password })
        });

        const data = await response.json();

        if (response.ok) {
          authMessage.style.display = 'block';
          authMessage.style.background = 'rgba(46, 125, 50, 0.2)';
          authMessage.style.color = '#2e7d32';
          authMessage.style.borderLeft = '4px solid #2e7d32';
          authMessage.textContent = '✓ Account created! Logging in...';
          
          // Auto-login after signup
          setTimeout(() => {
            localStorage.setItem('user_id', data.user_id);
            localStorage.setItem('user_name', data.name);
            window.location.href = 'form.html';
          }, 1000);
        } else {
          authMessage.style.display = 'block';
          authMessage.style.background = 'rgba(211, 47, 47, 0.2)';
          authMessage.style.color = '#d32f2f';
          authMessage.style.borderLeft = '4px solid #d32f2f';
          authMessage.textContent = '✗ ' + data.error;
        }
      } catch (error) {
        authMessage.style.display = 'block';
        authMessage.style.background = 'rgba(211, 47, 47, 0.2)';
        authMessage.style.color = '#d32f2f';
        authMessage.style.borderLeft = '4px solid #d32f2f';
        authMessage.textContent = '✗ Connection error. Please try again.';
      }
    });

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js')
        .then((reg) => console.log('Service Worker registered:', reg))
        .catch((err) => console.log('Service Worker registration failed:', err));
    }
  </script>
</body>
</html>
